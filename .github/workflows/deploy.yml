name: AITDL Platform V3 Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Master Verification Pipeline
        env:
          ENVIRONMENT: testing
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_ANON_KEY: "mock-key"
          SUPABASE_JWT_SECRET: "mock-secret"
        run: |
          python backend/scripts/aitdl_master_execute.py

  deploy-frontend:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Portal to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/portal
          vercel-args: '--prod'

  deploy-backend:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Backend to Railway
        run: railway up --detach
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
