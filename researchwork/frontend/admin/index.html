<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--
        Content Security Policy:
        - Restricts scripts to self + Google Fonts + trusted CDNs.
        - Prevents inline script injection attacks.
        - style-src includes 'unsafe-inline' for the CSS framework in use.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self';
                   script-src 'self' 'unsafe-inline';
                   style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
                   font-src https://fonts.gstatic.com;
                   img-src 'self' data:;
                   connect-src http://localhost:8080;
                   frame-ancestors 'none';">

    <!-- Prevent search engines from indexing the admin panel -->
    <meta name="robots" content="noindex, nofollow">

    <title>AITDL Admin — Login</title>

    <!-- Preconnect to speed up Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/admin.css">
</head>

<body>
    <div class="login-container" role="main">
        <div class="login-card" aria-labelledby="loginHeading">

            <h1 id="loginHeading">AITDL Portal</h1>
            <p>Admin Operations Dashboard</p>

            <form id="loginForm" novalidate aria-label="Admin login form">

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="admin@aitdl.com" required
                        autocomplete="username" aria-required="true" spellcheck="false" autocapitalize="none">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required
                        autocomplete="current-password" aria-required="true">
                </div>

                <button type="submit" class="btn-primary" id="loginBtn" aria-live="polite">
                    Authenticate Access
                </button>

                <!--
                    Error message region.
                    role="alert" ensures screen readers announce it immediately.
                -->
                <div id="errorMsg" class="error-msg" role="alert" aria-atomic="true" hidden>
                    Invalid credentials. Please try again.
                </div>

            </form>
        </div>
    </div>

    <script src="./js/admin-auth.js"></script>
    <script>
        // ── Guard: redirect already-authenticated users ───────────────────────
        if (Auth.isAuthenticated()) {
            window.location.replace('dashboard.html');
        }

        // ── Login form handler ────────────────────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            // UI: loading state
            btn.disabled = true;
            btn.textContent = 'Authenticating…';
            errorMsg.hidden = true;

            const success = await Auth.login(email, password);

            if (success) {
                // Use replace so Back button cannot return to the login page
                window.location.replace('dashboard.html');
            } else {
                errorMsg.hidden = false;
                btn.disabled = false;
                btn.textContent = 'Authenticate Access';
                // Return focus to email for another attempt
                document.getElementById('email').focus();
            }
        });
    </script>

</body>

</html>
