<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITDL - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/admin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>AITDL Portal</h1>
            <p>Admin Operations Dashboard</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">Authenticate Access</button>
                <div id="errorMsg" class="error-msg">Invalid credentials. Please try again.</div>
            </form>
        </div>
    </div>

    <script src="./js/admin-auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (Auth.isAuthenticated()) {
                window.location.href = 'dashboard.html';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = 'Authenticating...';
            errorMsg.style.display = 'none';

            const success = await Auth.login(email, password);
            if (success) {
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Authenticate Access';
            }
        });
    </script>
</body>
</html>
